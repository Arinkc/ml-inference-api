events { worker_processes 1; }

http {
  upstream backend { server backend:8000; }
  upstream frontend { server frontend:80; }

  server {
    listen 80;

    location /predict { proxy_pass http://backend; proxy_set_header Host $host; }
    location /stats   { proxy_pass http://backend; proxy_set_header Host $host; }
    location /health  { proxy_pass http://backend; }
    location /metrics { proxy_pass http://backend; }

    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / { proxy_pass http://frontend; }
  }
}